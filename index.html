<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Multi-Mode Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #121212;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        .calc-container {
            background-color: #1c1c1e;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
            position: relative;
            border: 1px solid #2c2c2e;
        }

        @media (min-width: 401px) {
            .calc-container {
                height: 885px;
                border-radius: 32px;
                box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            }
        }

        /* Top Bar Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 22px;
            font-weight: 600;
            color: #ffffff;
            border-bottom: 1px solid #2c2c2e;
            margin-bottom: 10px;
            position: relative;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sci-toggle-btn {
            background: none;
            border: none;
            color: #ff9f0a;
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .menu-btn {
            background: none;
            border: none;
            color: #ff9f0a;
            font-size: 26px;
            cursor: pointer;
            padding: 5px;
            user-select: none;
        }

        .menu-dropdown {
            display: none;
            position: absolute;
            top: 55px;
            right: 0;
            background-color: #2c2c2e;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            z-index: 200;
            width: 210px;
            overflow: hidden;
            border: 1px solid #3a3a3c;
        }

        .menu-dropdown button {
            display: block;
            width: 100%;
            padding: 16px 20px;
            background: none;
            border: none;
            color: #ffffff;
            text-align: left;
            font-size: 16px;
            cursor: pointer;
            border-bottom: 1px solid #3a3a3c;
        }

        .menu-dropdown button:last-child {
            border-bottom: none;
        }

        .menu-dropdown button:hover {
            background-color: #3a3a3c;
        }

        /* Display Screen Backdrop */
        .display-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            margin-bottom: 16px;
            overflow: hidden;
            width: 100%;
            background-color: #000000;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2c2c2e;
        }

        .calc-input {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 40px;
            text-align: right;
            width: 100%;
            outline: none;
            margin-bottom: 6px;
            font-weight: 400;
            overflow-x: auto;
            white-space: nowrap;
        }

        .calc-sub-output {
            color: #a5a5a5;
            font-size: 26px;
            text-align: right;
            width: 100%;
            min-height: 34px;
            font-weight: 400;
            display: block;
        }

        .breakdown-box {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            max-height: 120px;
            overflow-y: auto;
            border-top: 1px solid #2c2c2e;
            padding-top: 8px;
        }

        .breakdown-line {
            color: #d1d1d6;
            font-size: 19px;
        }

        .total-line {
            color: #30d158;
            font-size: 30px;
            font-weight: 600;
            margin-top: 2px;
            text-align: right;
            word-break: break-all;
        }

        /* Currency Conversion Cards */
        .currency-box-container {
            display: none;
            flex-direction: row;
            gap: 12px;
            width: 100%;
            margin-bottom: 4px;
        }

        .currency-inputs {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .currency-card {
            background-color: #2c2c2e;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            border: 1px solid #3a3a3c;
        }

        .currency-label {
            color: #aeaeb2;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .currency-val {
            background: none;
            border: none;
            color: #ff9f0a;
            font-size: 32px;
            width: 100%;
            outline: none;
            pointer-events: none; /* Block native input keyboard triggers */
        }

        .currency-swap {
            width: 60px;
            background-color: #2c2c2e;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 26px;
            color: #ff9f0a;
            border: 1px solid #3a3a3c;
            user-select: none;
        }

        .api-status {
            font-size: 11px;
            color: #8e8e93;
            text-align: left;
            width: 100%;
            margin-top: 4px;
        }

        /* Indian Mode Buttons Row */
        .indian-words-row {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 12px;
            width: 100%;
        }

        .word-btn {
            background-color: #2c2c2e;
            color: #30d158;
            border: 1px solid #3a3a3c;
            border-radius: 16px;
            height: 46px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Dynamic Scientific Expanded Keypad Layout */
        .scientific-row-block {
            display: none;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 12px;
            width: 100%;
        }

        .sci-btn {
            background-color: #2c2c2e;
            color: #9cdcfe;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            height: 40px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        .sci-btn:active, .word-btn:active {
            background-color: #3a3a3c;
        }

        /* Master Keypad Grid Array */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        .btn {
            background-color: #2c2c2e;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            aspect-ratio: 1;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            transition: background-color 0.1s;
        }

        .btn:active {
            background-color: #3a3a3c;
        }

        .btn.operator {
            background-color: #ff9f0a;
            color: #ffffff;
        }

        .btn.operator:active {
            background-color: #fca823;
        }

        .btn.action {
            background-color: #a5a5a5;
            color: #000000;
            font-weight: 600;
        }

        .btn.action:active {
            background-color: #d1d1d6;
        }

        .double-zero {
            font-size: 21px;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <!-- Navbar Header with Scientific Toggle Icon & 3-Dots Menu -->
    <div class="header">
        <span id="modeTitle">Standard Calculator</span>
        <div class="header-actions">
            <!-- Dynamic Scientific mode toggle button matching video profile -->
            <button class="sci-toggle-btn" id="sciToggle" onclick="toggleScientificMode()">🔬</button>
            <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        </div>
        <div class="menu-dropdown" id="menuDropdown">
            <button onclick="switchMode('standard')">Standard Calc</button>
            <button onclick="switchMode('indian')">Indian Lakh Mode</button>
            <button onclick="switchMode('currency')">Currency Converter</button>
        </div>
    </div>

    <!-- Processing Screen Panels -->
    <div class="display-area">
        <input type="text" class="calc-input" id="mainDisplay" value="0" readonly>
        <div class="calc-sub-output" id="subDisplay"></div>
        <div class="breakdown-box" id="breakdownContainer"></div>

        <!-- Currency conversion system display panel -->
        <div class="currency-box-container" id="currencyBox">
            <div class="currency-inputs">
                <div class="currency-card" id="cardTop" onclick="setActiveCard('top')">
                    <div class="currency-label" id="lblTop">US Dollar USD &gt;</div>
                    <input type="text" class="currency-val" id="valTop" value="0" readonly>
                </div>
                <div class="currency-card" id="cardBottom" onclick="setActiveCard('bottom')">
                    <div class="currency-label" id="lblBottom">Indian Rupee INR &gt;</div>
                    <input type="text" class="currency-val" id="valBottom" value="0" readonly>
                </div>
            </div>
            <div class="currency-swap" onclick="swapCurrency()">⇅</div>
        </div>
        <div class="api-status" id="apiTimestamp"></div>
    </div>

    <!-- Extra Collapsible Scientific Functional Rows Layout -->
    <div class="scientific-row-block" id="sciRow1">
        <button class="sci-btn" onclick="pressSciToken('(')">(</button>
        <button class="sci-btn" onclick="pressSciToken(')')">)</button>
        <button class="sci-btn" onclick="pressSciToken('√(')">√</button>
        <button class="sci-btn" onclick="pressSciToken('π')">π</button>
        <button class="sci-btn" onclick="pressSciToken('e')">e</button>
    </div>
    <div class="scientific-row-block" id="sciRow2">
        <button class="sci-btn" onclick="pressSciToken('sin(')">sin</button>
        <button class="sci-btn" onclick="pressSciToken('cos(')">cos</button>
        <button class="sci-btn" onclick="pressSciToken('tan(')">tan</button>
        <button class="sci-btn" onclick="pressSciToken('log(')">log</button>
        <button class="sci-btn" onclick="pressSciToken('ln(')">ln</button>
    </div>

    <!-- Indian Metric Words Row -->
    <div class="indian-words-row" id="indianRow">
        <button class="word-btn" onclick="pressWord('Hundred')">Hundred</button>
        <button class="word-btn" onclick="pressWord('Thousand')">Thousand</button>
        <button class="word-btn" onclick="pressWord('Lakh')">Lakh</button>
        <button class="word-btn" onclick="pressWord('Crore')">Crore</button>
    </div>

    <!-- Main Input Grid Matrix Panel -->
    <div class="keypad">
        <button class="btn action" onclick="pressClear()">AC</button>
        <button class="btn action" id="pctBtn" onclick="pressOperator('%')">%</button>
        <button class="btn action" onclick="pressBackspace()">⌫</button>
        <button class="btn operator" id="divBtn" onclick="pressOperator('/')">÷</button>

        <button class="btn" onclick="pressNum('7')">7</button>
        <button class="btn" onclick="pressNum('8')">8</button>
        <button class="btn" onclick="pressNum('9')">9</button>
        <button class="btn operator" id="mulBtn" onclick="pressOperator('*')">×</button>

        <button class="btn" onclick="pressNum('4')">4</button>
        <button class="btn" onclick="pressNum('5')">5</button>
        <button class="btn" onclick="pressNum('6')">6</button>
        <button class="btn operator" id="subBtn" onclick="pressOperator('-')">-</button>

        <button class="btn" onclick="pressNum('1')">1</button>
        <button class="btn" onclick="pressNum('2')">2</button>
        <button class="btn" onclick="pressNum('3')">3</button>
        <button class="btn operator" id="addBtn" onclick="pressOperator('+')">+</button>

        <button class="btn double-zero" onclick="pressNum('00')">00</button>
        <button class="btn" onclick="pressNum('0')">0</button>
        <button class="btn" onclick="pressNum('.')">.</button>
        <button class="btn operator" id="equalBtn" onclick="pressEqual()">=</button>
    </div>
</div>

<script>
    let currentMode = 'standard';
    let isSciOpen = false;
    
    const mainDisplay = document.getElementById('mainDisplay');
    const subDisplay = document.getElementById('subDisplay');
    const breakdownContainer = document.getElementById('breakdownContainer');
    
    let rawStandardExpression = ""; 
    let indianTokens = []; 
    let currentIndianBuffer = "";
    
    let usdToInrRate = 83.50; 
    let activeCurrencyInput = 'top'; 
    let isTopUSD = true;

    async function fetchRates() {
        try {
            let res = await fetch('https://open.er-api.com/v6/latest/USD');
            let data = await res.json();
            if(data && data.rates && data.rates.INR) {
                usdToInrRate = data.rates.INR;
                let now = new Date();
                document.getElementById('apiTimestamp').innerText = `Rates update: ${now.toLocaleDateString()} ${now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}).toLowerCase()}`;
            }
        } catch(e) {}
    }
    fetchRates();

    function toggleMenu() {
        const dropdown = document.getElementById('menuDropdown');
        dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
    }

    function toggleScientificMode() {
        if(currentMode === 'currency') return;
        isSciOpen = !isSciOpen;
        const displayState = isSciOpen ? 'grid' : 'none';
        document.getElementById('sciRow1').style.display = displayState;
        document.getElementById('sciRow2').style.display = displayState;
        document.getElementById('sciToggle').style.color = isSciOpen ? '#30d158' : '#ff9f0a';
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('menuDropdown').style.display = 'none';
        pressClear();
        
        document.getElementById('sciToggle').style.visibility = (mode === 'currency') ? 'hidden' : 'visible';
        if(mode === 'currency' && isSciOpen) toggleScientificMode();

        document.getElementById('indianRow').style.display = (mode === 'indian') ? 'grid' : 'none';
        document.getElementById('breakdownContainer').style.display = (mode === 'indian') ? 'flex' : 'none';
        document.getElementById('subDisplay').style.display = (mode === 'standard') ? 'block' : 'none';
        document.getElementById('currencyBox').style.display = (mode === 'currency') ? 'flex' : 'none';
        mainDisplay.style.display = (mode === 'currency') ? 'none' : 'block';

        const currencyHiddenOps = ['pctBtn', 'divBtn', 'mulBtn', 'subBtn', 'addBtn'];
        currencyHiddenOps.forEach(id => {
            document.getElementById(id).style.visibility = (mode === 'currency') ? 'hidden' : 'visible';
        });

        if(mode === 'standard') document.getElementById('modeTitle').innerText = "Standard Calculator";
        if(mode === 'indian') document.getElementById('modeTitle').innerText = "Indian Lakh Mode";
        if(mode === 'currency') {
            document.getElementById('modeTitle').innerText = "Currency converter";
            activeCurrencyInput = 'top';
            highlightActiveCard();
        }
    }

    function formatIndianNumber(num) {
        if (!num || isNaN(num)) return num;
        let str = num.toString().replace(/,/g, '');
        let parts = str.split('.');
        let x = parts[0];
        let lastThree = x.substring(x.length - 3);
        let otherNumbers = x.substring(0, x.length - 3);
        if (otherNumbers != '') lastThree = ',' + lastThree;
        let res = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
        if (parts.length > 1) res += '.' + parts[1];
        return res;
    }

    function convertToIndianWordsString(num) {
        let val = Math.abs(parseFloat(num));
        if (isNaN(val) || val === 0) return "0";
        let prefix = parseFloat(num) < 0 ? "-" : "";
        let crore = 10000000, lakh = 100000, thousand = 1000, hundred = 100;

        if (val >= crore) return prefix + (val / crore).toFixed(2) + " Crore";
        if (val >= lakh) return prefix + (val / lakh).toFixed(2) + " Lakh";
        if (val >= thousand) return prefix + (val / thousand).toFixed(2) + " Thousand";
        if (val >= hundred) return prefix + (val / hundred).toFixed(2) + " Hundred";
        return prefix + formatIndianNumber(val);
    }

    function pressNum(num) {
        if(currentMode === 'currency') {
            let field = activeCurrencyInput === 'top' ? document.getElementById('valTop') : document.getElementById('valBottom');
            if(field.value === '0' && num !== '.') field.value = num;
            else field.value += num;
            calculateCurrency(activeCurrencyInput);
            return;
        }

        if(currentMode === 'standard') {
            if(rawStandardExpression === "0" && num !== '.') rawStandardExpression = num;
            else rawStandardExpression += num;
            renderStandardRealTime();
        } else {
            currentIndianBuffer += num;
            renderIndianRealTime();
        }
    }

    function pressSciToken(token) {
        if(currentMode === 'currency') return;
        if(currentMode === 'standard') {
            rawStandardExpression += token;
            renderStandardRealTime();
        } else {
            if(currentIndianBuffer !== "") {
                indianTokens.push({ type: 'value', number: currentIndianBuffer, suffix: '' });
                currentIndianBuffer = "";
            }
            indianTokens.push({ type: 'sci', token: token });
            renderIndianRealTime();
        }
    }

    function pressWord(word) {
        if (currentMode !== 'indian' || currentIndianBuffer === "") return;
        indianTokens.push({ type: 'value', number: currentIndianBuffer, suffix: word });
        currentIndianBuffer = "";
        renderIndianRealTime();
    }

    function pressOperator(op) {
        if(currentMode === 'currency') return;
        if(currentMode === 'standard') {
            if(rawStandardExpression === "") return;
            let last = rawStandardExpression.slice(-1);
            if(["+", "-", "*", "/", "%"].includes(last)) {
                rawStandardExpression = rawStandardExpression.slice(0, -1) + op;
            } else {
                rawStandardExpression += op;
            }
            renderStandardRealTime();
        } else {
            if (currentIndianBuffer !== "") {
                indianTokens.push({ type: 'value', number: currentIndianBuffer, suffix: '' });
                currentIndianBuffer = "";
            }
            if (indianTokens.length === 0) return;
            let lastToken = indianTokens[indianTokens.length - 1];
            if (lastToken.type === 'operator') {
                lastToken.char = op;
            } else {
                indianTokens.push({ type: 'operator', char: op });
            }
            renderIndianRealTime();
        }
    }

    function pressClear() {
        rawStandardExpression = "";
        indianTokens = [];
        currentIndianBuffer = "";
        mainDisplay.value = "0";
        subDisplay.innerText = "";
        breakdownContainer.innerHTML = "";
        document.getElementById('valTop').value = '0';
        document.getElementById('valBottom').value = '0';
    }

    function pressBackspace() {
        if(currentMode === 'currency') {
            let field = activeCurrencyInput === 'top' ? document.getElementById('valTop') : document.getElementById('valBottom');
            field.value = field.value.slice(0, -1);
            if(field.value === '') field.value = '0';
            calculateCurrency(activeCurrencyInput);
            return;
        }

        if(currentMode === 'standard') {
            let matched = false;
            const longTokens = ["sin(", "cos(", "tan(", "log(", "ln(", "√("];
            for(let t of longTokens) {
                if(rawStandardExpression.endsWith(t)) {
                    rawStandardExpression = rawStandardExpression.slice(0, -t.length);
                    matched = true; break;
                }
            }
            if(!matched) rawStandardExpression = rawStandardExpression.slice(0, -1);
            renderStandardRealTime();
        } else {
            if (currentIndianBuffer !== "") {
                currentIndianBuffer = currentIndianBuffer.slice(0, -1);
            } else if (indianTokens.length > 0) {
                let popped = indianTokens.pop();
                if (popped.type === 'value') currentIndianBuffer = popped.number;
            }
            renderIndianRealTime();
        }
    }

    function evaluateAdvancedMathString(expr) {
        let clean = expr.replace(/×/g, '*').replace(/÷/g, '/')
                        .replace(/π/g, 'Math.PI')
                        .replace(/e/g, 'Math.E')
                        .replace(/([0-9.]+)\s*%/g, "($1/100)");
        
        clean = clean.replace(/sin\(/g, 'Math.sin(')
                     .replace(/cos\(/g, 'Math.cos(')
                     .replace(/tan\(/g, 'Math.tan(')
                     .replace(/log\(/g, 'Math.log10(')
                     .replace(/ln\(/g, 'Math.log(')
                     .replace(/√\(/g, 'Math.sqrt(');
        
        return new Function(`return (${clean})`)();
    }

    function renderStandardRealTime() {
        if(rawStandardExpression === "") {
            mainDisplay.value = "0";
            subDisplay.innerText = "";
            return;
        }
        mainDisplay.value = rawStandardExpression;

        try {
            let expr = rawStandardExpression;
            let lastChar = expr.slice(-1);
            if(["+", "-", "*", "/", "%"].includes(lastChar)) expr = expr.slice(0, -1);
            
            let res = evaluateAdvancedMathString(expr);
            if(res !== undefined && !isNaN(res)) subDisplay.innerText = formatIndianNumber(res.toString());
        } catch(e) {}
    }

    function renderIndianRealTime() {
        let displayStringArr = [];
        indianTokens.forEach(t => {
            if (t.type === 'value') displayStringArr.push(`${t.number} ${t.suffix}`.trim());
            else if (t.type === 'operator') displayStringArr.push(` ${t.char} `);
            else displayStringArr.push(t.token);
        });
        if (currentIndianBuffer !== "") displayStringArr.push(currentIndianBuffer);
        mainDisplay.value = displayStringArr.join("") || "0";

        breakdownContainer.innerHTML = "";
        let multiplierMap = { 'Hundred': 100, 'Thousand': 1000, 'Lakh': 100000, 'Crore': 10000000 };
        let mathEvaluationArr = [];

        indianTokens.forEach(t => {
            if (t.type === 'value') {
                let factor = multiplierMap[t.suffix] || 1;
                let calcVal = parseFloat(t.number) * factor;
                mathEvaluationArr.push(calcVal);

                let row = document.createElement('div');
                row.className = 'breakdown-line';
                row.innerText = `${t.suffix ? t.suffix + ': ' : ''}${formatIndianNumber(calcVal)}`;
                breakdownContainer.appendChild(row);
            } else if (t.type === 'operator') {
                mathEvaluationArr.push(t.char);
            } else {
                mathEvaluationArr.push(t.token);
            }
        });

        if (currentIndianBuffer !== "") {
            let row = document.createElement('div');
            row.className = 'breakdown-line';
            row.innerText = formatIndianNumber(currentIndianBuffer);
            breakdownContainer.appendChild(row);
            mathEvaluationArr.push(parseFloat(currentIndianBuffer));
        }

        if (mathEvaluationArr.length > 0) {
            try {
                let exprStr = mathEvaluationArr.join("");
                let totalVal = evaluateAdvancedMathString(exprStr);
                
                if(totalVal !== undefined && !isNaN(totalVal)) {
                    let totalRow = document.createElement('div');
                    totalRow.className = 'total-line';
                    totalRow.innerText = `= ${convertToIndianWordsString(totalVal)} (${formatIndianNumber(totalVal.toFixed(2))})`;
                    breakdownContainer.appendChild(totalRow);
                }
            } catch (e) {}
        }
        breakdownContainer.scrollTop = breakdownContainer.scrollHeight;
    }

    function pressEqual() {
        if(currentMode === 'currency') return;
        if(currentMode === 'standard') {
            if(subDisplay.innerText !== "") {
                mainDisplay.value = subDisplay.innerText;
                rawStandardExpression = subDisplay.innerText.replace(/,/g, '');
                subDisplay.innerText = "";
            }
        } else {
            if (breakdownContainer.lastChild && breakdownContainer.lastChild.className === 'total-line') {
                let rawMatch = breakdownContainer.lastChild.innerText.match(/\(([^)]+)\)/);
                if (rawMatch) {
                    let finalVal = rawMatch[1].replace(/,/g, '');
                    indianTokens = [];
                    currentIndianBuffer = finalVal;
                    renderIndianRealTime();
                }
            }
        }
    }

    function calculateCurrency(source) {
        let topVal = parseFloat(document.getElementById('valTop').value.replace(/,/g, '')) || 0;
        let bottomVal = parseFloat(document.getElementById('valBottom').value.replace(/,/g, '')) || 0;

        if(source === 'top') {
            if(isTopUSD) {
                document.getElementById('valBottom').value = formatIndianNumber((topVal * usdToInrRate).toFixed(2));
            } else {
                document.getElementById('valTop').value = formatIndianNumber((topVal / usdToInrRate).toFixed(4));
            }
        } else {
            if(isTopUSD) {
                document.getElementById('valTop').value = formatIndianNumber((bottomVal / usdToInrRate).toFixed(4));
            } else {
                document.getElementById('valBottom').value = formatIndianNumber((bottomVal * usdToInrRate).toFixed(2));
            }
        }
    }

    function swapCurrency() {
        isTopUSD = !isTopUSD;
        let lblTop = document.getElementById('lblTop');
        let lblBottom = document.getElementById('lblBottom');
        if(isTopUSD) {
            lblTop.innerText = "US Dollar USD >";
            lblBottom.innerText = "Indian Rupee INR >";
        } else {
            lblTop.innerText = "Indian Rupee INR >";
            lblBottom.innerText = "US Dollar USD >";
        }
        pressClear();
    }

    function setActiveCard(card) {
        activeCurrencyInput = card;
        highlightActiveCard();
    }

    function highlightActiveCard() {
        document.getElementById('cardTop').style.borderColor = activeCurrencyInput === 'top' ? '#ff9f0a' : '#3a3a3c';
        document.getElementById('cardBottom').style.borderColor = activeCurrencyInput === 'bottom' ? '#ff9f0a' : '#3a3a3c';
    }
</script>
</body>
</html>
