<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Multi-Line Break Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #ffffff;
        }

        .calc-container {
            background-color: #000000;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 24px;
        }

        @media (min-width: 401px) {
            .calc-container {
                height: 885px;
                border-radius: 32px;
                box-shadow: 0 20px 50px rgba(255,255,255,0.03);
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            font-size: 22px;
            font-weight: 500;
        }

        /* Twin Screen Dynamic Vertical Layout */
        .display-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            margin-bottom: 20px;
            overflow: hidden;
        }

        /* Oporer Line: Jekhane pure text + number operational string thakbe */
        .calc-input {
            background: none;
            border: none;
            color: #ffffff;
            font-size: 38px;
            text-align: right;
            width: 100%;
            outline: none;
            margin-bottom: 15px;
            font-weight: 400;
        }

        /* Nicher area: Jekhane vertical breakdown and answer line bi line thakbe */
        .breakdown-box {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
            border-top: 1px solid #2c2c2e;
            padding-top: 10px;
        }

        .breakdown-line {
            color: #a5a5a5;
            font-size: 20px;
            font-weight: 400;
        }

        .total-line {
            color: #30d158;
            font-size: 32px;
            font-weight: 600;
            margin-top: 4px;
        }

        /* Macro Word Action Buttons Row */
        .indian-words-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 16px;
            width: 100%;
        }

        .word-btn {
            background-color: #1c1c1e;
            color: #30d158;
            border: none;
            border-radius: 20px;
            height: 50px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .word-btn:active {
            filter: brightness(1.4);
        }

        /* Universal Numeric Grid */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
        }

        .btn {
            background-color: #1c1c1e;
            color: #ffffff;
            border: none;
            border-radius: 50%;
            aspect-ratio: 1;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        .btn:active {
            filter: brightness(1.4);
        }

        .btn.operator {
            background-color: #ff9f0a;
            color: #ffffff;
        }

        .btn.action {
            background-color: #a5a5a5;
            color: #000000;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="calc-container">
    <div class="header">
        <span>Indian Lakh Mode</span>
    </div>

    <!-- Active Display Matrix -->
    <div class="display-area">
        <!-- Input line for direct text display like '85 Thousand' -->
        <input type="text" class="calc-input" id="mainDisplay" value="" placeholder="0" readonly>
        
        <!-- Niche niche list dekhano container -->
        <div class="breakdown-box" id="breakdownContainer">
            <!-- Dynamic lines will drop here vertically -->
        </div>
    </div>

    <!-- Word Multipliers -->
    <div class="indian-words-row">
        <button class="word-btn" onclick="pressWord('Hundred')">Hundred</button>
        <button class="word-btn" onclick="pressWord('Thousand')">Thousand</button>
        <button class="word-btn" onclick="pressWord('Lakh')">Lakh</button>
        <button class="word-btn" onclick="pressWord('Crore')">Crore</button>
    </div>

    <!-- Standard Core Array Pad -->
    <div class="keypad">
        <button class="btn action" onclick="pressClear()">AC</button>
        <button class="btn action" onclick="pressOperator('%')">%</button>
        <button class="btn action" onclick="pressBackspace()">⌫</button>
        <button class="btn operator" onclick="pressOperator('/')">÷</button>

        <button class="btn" onclick="pressNum('7')">7</button>
        <button class="btn" onclick="pressNum('8')">8</button>
        <button class="btn" onclick="pressNum('9')">9</button>
        <button class="btn operator" onclick="pressOperator('*')">×</button>

        <button class="btn" onclick="pressNum('4')">4</button>
        <button class="btn" onclick="pressNum('5')">5</button>
        <button class="btn" onclick="pressNum('6')">6</button>
        <button class="btn operator" onclick="pressOperator('-')">-</button>

        <button class="btn" onclick="pressNum('1')">1</button>
        <button class="btn" onclick="pressNum('2')">2</button>
        <button class="btn" onclick="pressNum('3')">3</button>
        <button class="btn operator" onclick="pressOperator('+')">+</button>

        <button class="btn" onclick="pressNum('00')">00</button>
        <button class="btn" onclick="pressNum('0')">0</button>
        <button class="btn" onclick="pressNum('.')">.</button>
        <button class="btn operator" onclick="pressEqual()">=</button>
    </div>
</div>

<script>
    let mainDisplay = document.getElementById('mainDisplay');
    let breakdownContainer = document.getElementById('breakdownContainer');
    
    // Arrays to maintain user inputs cleanly
    let displayTokens = []; 
    let currentNumBuffer = "";

    function formatIndianNumber(num) {
        if (!num || isNaN(num)) return num;
        let str = num.toString();
        let parts = str.split('.');
        let x = parts[0];
        let lastThree = x.substring(x.length - 3);
        let otherNumbers = x.substring(0, x.length - 3);
        if (otherNumbers != '') lastThree = ',' + lastThree;
        let res = otherNumbers.replace(/\B(?=(\d{2})+(?!\d))/g, ",") + lastThree;
        if (parts.length > 1) res += '.' + parts[1];
        return res;
    }

    function pressNum(num) {
        currentNumBuffer += num;
        renderRealTime();
    }

    function pressWord(word) {
        if (currentNumBuffer === "") return;
        // Token format object maps strings cleanly
        displayTokens.push({
            type: 'value',
            number: currentNumBuffer,
            suffix: word
        });
        currentNumBuffer = "";
        renderRealTime();
    }

    function pressOperator(op) {
        if (currentNumBuffer !== "") {
            displayTokens.push({ type: 'value', number: currentNumBuffer, suffix: '' });
            currentNumBuffer = "";
        }
        if (displayTokens.length === 0) return;
        
        // Handle trailing duplicate operational maps cleanly
        if (displayTokens[displayTokens.length - 1].type === 'operator') {
            displayTokens[displayTokens.length - 1].char = op;
        } else {
            displayTokens.push({ type: 'operator', char: op });
        }
        renderRealTime();
    }

    function pressClear() {
        displayTokens = [];
        currentNumBuffer = "";
        mainDisplay.value = "";
        breakdownContainer.innerHTML = "";
    }

    function pressBackspace() {
        if (currentNumBuffer !== "") {
            currentNumBuffer = currentNumBuffer.slice(0, -1);
        } else if (displayTokens.length > 0) {
            let popped = displayTokens.pop();
            if (popped.type === 'value') {
                currentNumBuffer = popped.number; // Bring back into modification layer
            }
        }
        renderRealTime();
    }

    // Core Real-Time Engine processing action events
    function renderRealTime() {
        // 1. Build string format for the top line
        let topStringArr = [];
        displayTokens.forEach(t => {
            if (t.type === 'value') {
                topStringArr.push(`${t.number} ${t.suffix}`.trim());
            } else {
                topStringArr.push(` ${t.char} `);
            }
        });
        if (currentNumBuffer !== "") {
            topStringArr.push(currentNumBuffer);
        }
        mainDisplay.value = topStringArr.join("");

        // 2. Clear breakdown lines to reconstruct clean DOM tree rows vertically
        breakdownContainer.innerHTML = "";

        let multiplierMap = { 'Hundred': 100, 'Thousand': 1000, 'Lakh': 100000, 'Crore': 10000000 };
        let mathExpressionArr = [];
        let runningTotal = 0;

        // Process existing tokens
        displayTokens.forEach(t => {
            if (t.type === 'value') {
                let factor = multiplierMap[t.suffix] || 1;
                let calculatedValue = parseFloat(t.number) * factor;
                mathExpressionArr.push(calculatedValue);

                // Add formatted number line vertically
                let row = document.createElement('div');
                row.className = 'breakdown-line';
                row.innerText = `${t.suffix ? t.suffix + ': ' : ''}${formatIndianNumber(calculatedValue)}`;
                breakdownContainer.appendChild(row);
            } else {
                mathExpressionArr.push(t.char);
            }
        });

        // Add currently typing buffer line into vertical layout stack
        if (currentNumBuffer !== "") {
            let row = document.createElement('div');
            row.className = 'breakdown-line';
            row.innerText = formatIndianNumber(currentNumBuffer);
            breakdownContainer.appendChild(row);
            mathExpressionArr.push(parseFloat(currentNumBuffer));
        }

        // 3. Evaluate total logic stream natively 
        if (mathExpressionArr.length > 0) {
            try {
                let lastElement = mathExpressionArr[mathExpressionArr.length - 1];
                if (['+', '-', '*', '/', '%'].includes(lastElement)) {
                    mathExpressionArr.pop(); // Temp strip trails for evaluation breaks
                }
                
                let exprString = mathExpressionArr.join("")
                                                  .replace(/×/g, '*')
                                                  .replace(/÷/g, '/');
                
                if(exprString.trim() !== "") {
                    let totalVal = new Function(`return (${exprString})`)();
                    if (totalVal % 1 !== 0) totalVal = parseFloat(totalVal.toFixed(4));

                    // Final Total Line right at the bottom
                    let totalRow = document.createElement('div');
                    totalRow.className = 'total-line';
                    totalRow.innerText = `= ${formatIndianNumber(totalVal)}`;
                    breakdownContainer.appendChild(totalRow);
                }
            } catch (e) {
                // Quiet mid-flow catch logs
            }
        }
        
        // Auto scroll container to view newest entries safely
        breakdownContainer.scrollTop = breakdownContainer.scrollHeight;
    }

    function pressEqual() {
        if (breakdownContainer.lastChild && breakdownContainer.lastChild.className === 'total-line') {
            let finalValueStr = breakdownContainer.lastChild.innerText.replace('= ', '').replace(/,/g, '');
            displayTokens = [];
            currentNumBuffer = finalValueStr;
            renderRealTime();
        }
    }
</script>
</body>
</html>
